# Cargo workspace configuration for ROS 2 Rolling pixi build
#
# CARGO_HOME is set to this directory's parent via the pixi activation env,
# so this config is found by cargo even when running in ExternalProject
# build subdirectories (e.g. zenoh_cpp_vendor -> zenoh_c_vendor).

[profile.dev]
# Disable debug_assertions in dev builds to avoid a bug in static_init 1.0.3
# where debug_assertions inadvertently activates the parking_lot feature,
# causing E0433 with Rust >= 1.82. Fixed upstream in static_init 1.0.4.
debug-assertions = false

# Use rust-lld on Windows instead of MSVC link.exe.
# sccache only caches compiler (rustc) invocations, not the linker.
# For a large Rust project like zenoh-c (~100+ crates), the link step
# dominates build time. rust-lld ships with rustc >= 1.71 and is 3-4x
# faster than MSVC link.exe for large workloads.
[target.x86_64-pc-windows-msvc]
linker = "rust-lld.exe"

# Use mold on Linux for the Rust link step (zenoh-c and friends).
# mold is significantly faster than GNU ld for large Rust workloads.
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# Use lld on macOS for the Rust link step.
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-fuse-ld=lld"]
