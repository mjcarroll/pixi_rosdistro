# Cargo workspace configuration for ROS 2 Rolling pixi build
#
# CARGO_HOME is set to this directory's parent via the pixi activation env,
# so this config is found by cargo even when running in ExternalProject
# build subdirectories (e.g. zenoh_cpp_vendor -> zenoh_c_vendor).

[profile.dev]
# Disable debug_assertions in dev builds to avoid a bug in static_init 1.0.3
# where debug_assertions inadvertently activates the parking_lot feature,
# causing E0433 with Rust >= 1.82. Fixed upstream in static_init 1.0.4.
debug-assertions = false
