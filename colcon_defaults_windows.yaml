build:
  merge-install: true
  executor: parallel
  # These packages are Linux-only (LTTng based) and fail on Windows/MacOS
  packages-skip:
    - lttngpy
    - tracetools_trace
    - ros2trace
    - tracetools_launch
    - test_ros2trace
    - test_tracetools
    - test_tracetools_launch
    - tracetools_test
    - cyclonedds
    - rmw_cyclonedds_cpp
  cmake-args:
    - -GNinja
    - --no-warn-unused-cli
    - -DCMAKE_BUILD_TYPE=Release
    - -DCMAKE_BUILD_WITH_INSTALL_RPATH:bool=TRUE
    # CMake 4.x requires cmake_minimum_required >= 3.5
    - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    - -Wno-deprecated
    # Avoid BFD linker issues in conda environments
    - -DSTACK_DETAILS_AUTO_DETECT:bool=FALSE
    - -DSTACK_DETAILS_BFD:bool=FALSE
    - -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded
    - -DCMAKE_CXX_FLAGS=/MP /FS /EHsc
    - -DCMAKE_C_FLAGS=/MP /FS
    - -DBUILD_TESTING=OFF

test:
  merge-install: true
  event-handlers:
    - console_start_end+
    - console_cohesion+
