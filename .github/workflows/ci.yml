name: CI

on:
  push:
    branches: [main, rolling]
  pull_request:
    branches: [main, rolling]

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pixi-platform: linux-64
            cache-tool: sccache
            cache-dir: ~/.cache/sccache
          - os: windows-latest
            pixi-platform: win-64
            cache-tool: sccache
            cache-dir: C:\Users\runneradmin\AppData\Local\Mozilla\sccache
          - os: macos-latest
            pixi-platform: osx-arm64
            cache-tool: sccache
            cache-dir: ~/Library/Caches/Mozilla.sccache

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Install Pixi
      # cache: false avoids EBUSY on Windows — the pixi env dir gets locked by
      # subprocesses (ninja, sccache, cl.exe) during build and Windows refuses
      # to rmdir a locked path. pixi install from pixi.lock is fast enough (~1min).
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: false

      # Compiler cache — sccache on all platforms (C/C++ and Rust)
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache-dir }}
          key: ${{ matrix.pixi-platform }}-sccache-${{ github.sha }}
          restore-keys: |
            ${{ matrix.pixi-platform }}-sccache-

      # Fetch ROS 2 sources
      - name: Fetch sources
        run: pixi run fetch

      # Build
      - name: Build
        run: pixi run build

      # Stop sccache daemon so it releases file locks before post-job cleanup.
      # Without this, sccache.exe holds open handles in .pixi/envs/default/bin
      # and Windows refuses to rmdir the locked path (EBUSY).
      - name: Stop sccache
        if: always()
        run: pixi run -e default sccache --stop-server || true
