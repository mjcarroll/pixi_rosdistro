name: CI

on:
  push:
    branches: [main, rolling]
  pull_request:
    branches: [main, rolling]

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pixi-platform: linux-64
            cache-tool: sccache
            cache-dir: ~/.cache/sccache
          - os: windows-latest
            pixi-platform: win-64
            cache-tool: sccache
            cache-dir: C:\Users\runneradmin\AppData\Local\Mozilla\sccache
          - os: macos-latest
            pixi-platform: osx-arm64
            cache-tool: sccache
            cache-dir: ~/Library/Caches/Mozilla.sccache

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Install Pixi
      # cache: false avoids EBUSY on Windows — the pixi env dir gets locked by
      # subprocesses (ninja, sccache, cl.exe) during build and Windows refuses
      # to rmdir a locked path. pixi install from pixi.lock is fast enough (~1min).
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: false

      # Compiler cache — sccache on all platforms (C/C++ and Rust)
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache-dir }}
          key: ${{ matrix.pixi-platform }}-sccache-${{ github.sha }}
          restore-keys: |
            ${{ matrix.pixi-platform }}-sccache-

      # Fetch ROS 2 sources
      - name: Fetch sources
        run: pixi run fetch

      # Show sccache stats before build (zero on first run, hits on subsequent)
      - name: sccache stats (pre-build)
        run: pixi run -e default sccache --show-stats

      # Build
      - name: Build
        run: pixi run build

      # Scan colcon per-package logs for compiler warnings and write to job summary.
      # Uses bash on all platforms (Git Bash on Windows). Matches:
      #   GCC/Clang:  "file.cpp:42:10: warning: ..."
      #   MSVC:       "file.cpp(42): warning C4xxx: ..."
      - name: Report compiler warnings
        if: always()
        shell: bash
        run: |
          {
            echo "## 🔔 Compiler Warnings"
            echo ""
            mapfile -t warnings < <(
              grep -rh --include="stdout_stderr.log" \
                -e ": warning:" -e ": warning C" \
                log/ 2>/dev/null \
              | sort -u
            )
            if [ ${#warnings[@]} -eq 0 ]; then
              echo "_No compiler warnings found._"
            else
              echo "| # | Warning |"
              echo "|---|---------|"
              n=1
              for w in "${warnings[@]}"; do
                echo "| $n | \`${w}\` |"
                n=$((n + 1))
              done
              echo ""
              echo "**Total unique warnings: $((n - 1))**"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Show final cache hit/miss stats, then stop daemon to release file locks
      # before post-job cleanup (otherwise Windows EBUSY on .pixi/envs/default/bin).
      - name: sccache stats (post-build) + stop
        if: always()
        run: |
          pixi run -e default sccache --show-stats || true
          pixi run -e default sccache --stop-server || true
