name: CI

on:
  push:
    branches: [main, rolling]
  pull_request:
    branches: [main, rolling]

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pixi-platform: linux-64
            sccache-prefix: linux
          - os: windows-latest
            pixi-platform: win-64
            sccache-prefix: windows
          - os: macos-latest
            pixi-platform: osx-arm64
            sccache-prefix: macos

    runs-on: ${{ matrix.os }}
    env:
      # sccache — GCS remote backend
      # One shared bucket, per-OS key prefix (no cross-OS hits but no collisions either).
      # Requires the following GitHub Actions secret:
      #   GCP_SA_KEY  — Service account JSON key (raw JSON, needs storage.objectAdmin on bucket)
      SCCACHE_GCS_BUCKET: pixi-rosdistro-sccache
      SCCACHE_GCS_KEY_PREFIX: ${{ matrix.sccache-prefix }}
      SCCACHE_GCS_RW_MODE: READ_WRITE
      # Ensure sccache is used for all Rust compilations (including ament_vendor/ExternalProject)
      RUSTC_WRAPPER: sccache
      # Explicitly build Gazebo from source as requested, relaxation of version checks
      GZ_BUILD_FROM_SOURCE: "1"
      # Opt-in to Node.js 24 for actions
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Install Pixi
      # cache: false avoids EBUSY on Windows — the pixi env dir gets locked by
      # subprocesses (ninja, sccache, cl.exe) during build and Windows refuses
      # to rmdir a locked path. pixi install from pixi.lock is fast enough (~1min).
      - uses: prefix-dev/setup-pixi@v0.14.0
        with:
          pixi-version: latest
          cache: false

      # Write GCP service account key so sccache can authenticate with GCS.
      # The secret GCP_SA_KEY should contain the raw JSON key for the SA.
      # The SA needs roles/storage.objectAdmin on SCCACHE_GCS_BUCKET.
      - name: Authenticate sccache with GCS
        if: ${{ env.SCCACHE_GCS_BUCKET != '' }}
        shell: bash
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" > /tmp/gcp-sa-key.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-sa-key.json" >> "$GITHUB_ENV"

      # Fetch ROS 2 sources and apply patches
      - name: Fetch and Patch sources
        run: |
          pixi run fetch
          pixi run patch

      # Show sccache stats before build (zero on first run, hits on subsequent)
      - name: sccache stats (pre-build)
        run: pixi run -e default sccache --show-stats

      # Build — Capture all output to build.log, but only show summary/failures in console.
      - name: Build
        shell: bash
        run: |
          # Use --event-handlers summary+ console_package_list- to reduce console noise.
          # colcon stores individual package logs in log/latest_build/<pkg>/
          pixi run build -- --event-handlers summary+ console_package_list- 2>&1 | tee build.log
          
          # PIPESTATUS[0] is the exit code of pixi run build
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "::error::Build failed. See logs of failed packages below."
            # Find packages that failed in the build log
            FAILED_PKGS=$(grep "Failed   <<<" build.log | sed -E 's/.*Failed   <<< ([^ ]+).*/\1/' | sort | uniq)
            for PKG in $FAILED_PKGS; do
              echo "::group::Output of failed package: $PKG"
              if [ -d "log/latest_build/$PKG" ]; then
                [ -f "log/latest_build/$PKG/stdout.log" ] && cat "log/latest_build/$PKG/stdout.log"
                [ -f "log/latest_build/$PKG/stderr.log" ] && cat "log/latest_build/$PKG/stderr.log"
              else
                echo "Log directory for $PKG not found in log/latest_build/"
              fi
              echo "::endgroup::"
            done
            exit 1
          fi

      # Upload colcon logs as an artifact for debugging.
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: colcon-logs-${{ matrix.os }}
          path: log/
          if-no-files-found: ignore

      # Scan build log for package durations and compiler warnings, then write to job summary.
      # Uses bash on all platforms (Git Bash on Windows).
      - name: Report Build Results
        if: always()
        shell: bash
        run: |
          {
            echo "## 📊 Build Report"
            echo ""
            if [ -f build.log ]; then
              echo "### ⏱️ Package Durations"
              echo "| Package | Duration |"
              echo "|---------|----------|"
              # Format: Finished <<< package_name [X.Ys]
              grep "Finished <<<" build.log | sed -E 's/.*Finished <<< ([^ ]+) \[(.+)\]/| \1 | \2 |/' | sort | uniq
              echo ""

              echo "### 🔔 Compiler Warnings"
              echo ""
              warnings_found=false
              # Warnings are in per-package colcon log files (console_cohesion+ doesn't stream them to stdout)
              latest_build=$(ls -dt log/build_* 2>/dev/null | head -1)
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  if ! $warnings_found; then
                    echo "| # | Warning |"
                    echo "|---|---------|"
                    warnings_found=true
                    n=1
                  fi
                  echo "| $n | \`${line}\` |"
                  n=$((n + 1))
                fi
              done < <(grep -rha -e ": warning:" -e ": warning C" "${latest_build}" 2>/dev/null | sort -u)
              
              if ! $warnings_found; then
                echo "_No compiler warnings found in the build log._"
              fi
            else
              echo "_Build log not found._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Show final cache hit/miss stats, then stop daemon to release file locks
      # before post-job cleanup (otherwise Windows EBUSY on .pixi/envs/default/bin).
      - name: sccache stats (post-build) + stop
        if: always()
        run: |
          pixi run -e default sccache --show-stats || true
          pixi run -e default sccache --stop-server || true
