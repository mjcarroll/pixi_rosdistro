name: CI

on:
  push:
    branches: [main, rolling]
  pull_request:
    branches: [main, rolling]

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            pixi-platform: linux-64
            cache-tool: sccache
            cache-dir: ~/.cache/sccache
          - os: windows-latest
            pixi-platform: win-64
            cache-tool: sccache
            cache-dir: C:\Users\runneradmin\AppData\Local\Mozilla\sccache
          - os: macos-latest
            pixi-platform: osx-arm64
            cache-tool: sccache
            cache-dir: ~/Library/Caches/Mozilla.sccache

    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_DIR: ${{ matrix.cache-dir }}
      # Ensure sccache is used for all Rust compilations (including ament_vendor/ExternalProject)
      RUSTC_WRAPPER: sccache
      # Potential remote backend (uncomment and set secrets to use S3/GCS/Azure)
      # SCCACHE_BUCKET: ${{ secrets.SCCACHE_BUCKET }}
      # SCCACHE_REGION: ${{ secrets.SCCACHE_REGION }}
      # GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
      # AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT }}
      # AZURE_STORAGE_KEY: ${{ secrets.AZURE_STORAGE_KEY }}
      # AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Install Pixi
      # cache: false avoids EBUSY on Windows — the pixi env dir gets locked by
      # subprocesses (ninja, sccache, cl.exe) during build and Windows refuses
      # to rmdir a locked path. pixi install from pixi.lock is fast enough (~1min).
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: false

      # Compiler cache — sccache on all platforms (C/C++ and Rust)
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ matrix.cache-dir }}
          key: ${{ matrix.pixi-platform }}-sccache-${{ github.sha }}
          restore-keys: |
            ${{ matrix.pixi-platform }}-sccache-

      # Fetch ROS 2 sources
      - name: Fetch sources
        run: pixi run fetch

      # Show sccache stats before build (zero on first run, hits on subsequent)
      - name: sccache stats (pre-build)
        run: pixi run -e default sccache --show-stats

      # Build
      - name: Build
        shell: bash
        run: pixi run build 2>&1 | tee build.log

      # Scan build log for package durations and compiler warnings, then write to job summary.
      # Uses bash on all platforms (Git Bash on Windows).
      - name: Report Build Results
        if: always()
        shell: bash
        run: |
          {
            echo "## 📊 Build Report"
            echo ""
            if [ -f build.log ]; then
              echo "### ⏱️ Package Durations"
              echo "| Package | Duration |"
              echo "|---------|----------|"
              # Format: Finished <<< package_name [X.Ys]
              grep "Finished <<<" build.log | sed -E 's/.*Finished <<< ([^ ]+) \[(.+)\]/| \1 | \2 |/' | sort | uniq
              echo ""

              echo "### 🔔 Compiler Warnings"
              echo ""
              warnings_found=false
              # Grep build.log for GCC/Clang and MSVC warnings
              while IFS= read -r line; do
                if [ -n "$line" ]; then
                  if ! $warnings_found; then
                    echo "| # | Warning |"
                    echo "|---|---------|"
                    warnings_found=true
                    n=1
                  fi
                  echo "| $n | \`${line}\` |"
                  n=$((n + 1))
                fi
              done < <(grep -a -e ": warning:" -e ": warning C" build.log | sort -u)
              
              if ! $warnings_found; then
                echo "_No compiler warnings found in the build log._"
              fi
            else
              echo "_Build log not found._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      # Show final cache hit/miss stats, then stop daemon to release file locks
      # before post-job cleanup (otherwise Windows EBUSY on .pixi/envs/default/bin).
      - name: sccache stats (post-build) + stop
        if: always()
        run: |
          pixi run -e default sccache --show-stats || true
          pixi run -e default sccache --stop-server || true
