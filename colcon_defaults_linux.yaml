build:
  merge-install: true
  executor: parallel
  # These packages require lttng-tools/lttng-ctl which is missing from conda-forge
  packages-skip:
    - lttngpy
    - tracetools_trace
    - ros2trace
    - tracetools_launch
    - test_ros2trace
    - test_tracetools
    - test_tracetools_launch
    - tracetools_test
  cmake-args:
    - -GNinja
    - --no-warn-unused-cli
    - -DCMAKE_BUILD_TYPE=Release
    - -DCMAKE_BUILD_WITH_INSTALL_RPATH:bool=TRUE
    # CMake 4.x requires cmake_minimum_required >= 3.5
    - -DCMAKE_POLICY_VERSION_MINIMUM=3.5
    - -Wno-deprecated
    - -DSTACK_DETAILS_AUTO_DETECT:bool=FALSE
    - -DSTACK_DETAILS_BFD:bool=FALSE
    - -DTRACETOOLS_DISABLED=ON

test:
  merge-install: true
  event-handlers:
    - console_start_end+
    - console_cohesion+
