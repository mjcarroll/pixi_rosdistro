build:
  merge-install: true
  executor: sequential
  # Tier 4: rcpputils, rosidl generators, rmw up to rcl_yaml_param_parser
  packages-up-to:
    - rcl_yaml_param_parser
  cmake-args:
    - -GNinja
    - --no-warn-unused-cli
    - -DCMAKE_BUILD_TYPE=Release
    - -DCMAKE_BUILD_WITH_INSTALL_RPATH:bool=TRUE
    # Avoid BFD linker issues in conda environments
    - -DSTACK_DETAILS_AUTO_DETECT:bool=FALSE
    - -DSTACK_DETAILS_BFD:bool=FALSE
  event-handlers:
    - console_direct+
    - console_package_list+

test:
  merge-install: true
  event-handlers:
    - console_direct+
