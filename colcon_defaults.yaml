build:
  merge-install: true
  executor: sequential
  # Tier 5: rcl → rcl_action/rcl_lifecycle → rclcpp, rclpy
  packages-up-to:
    - rclcpp
    - rclpy
  cmake-args:
    - -GNinja
    - --no-warn-unused-cli
    - -DCMAKE_BUILD_TYPE=Release
    - -DCMAKE_BUILD_WITH_INSTALL_RPATH:bool=TRUE
    # Avoid BFD linker issues in conda environments
    - -DSTACK_DETAILS_AUTO_DETECT:bool=FALSE
    - -DSTACK_DETAILS_BFD:bool=FALSE
  event-handlers:
    - console_direct+
    - console_package_list+

test:
  merge-install: true
  event-handlers:
    - console_direct+
