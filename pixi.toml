[workspace]
name = "ros2_rolling"
version = "0.1.0"
description = "ROS 2 Rolling source build workspace with Pixi"
authors = []
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

# ==============================================================================
# Environments
# - default: runtime + build (what you need to build and run)
# - runtime: runtime-only (what a binary artifact consumer needs)
# ==============================================================================
[environments]
default = { features = ["runtime", "build"], solve-group = "default" }
runtime = { features = ["runtime"], solve-group = "default" }

# ==============================================================================
# Activation environment variables (applies to all environments)
# ==============================================================================
[activation.env]
COLCON_DEFAULTS_FILE        = "colcon_defaults.yaml"
# sccache is used on all platforms for C/C++ and Rust caching
CMAKE_C_COMPILER_LAUNCHER   = "sccache"
CMAKE_CXX_COMPILER_LAUNCHER = "sccache"
# sccache also supports Rust — routes rustc through the cache for zenoh_c_vendor etc.
RUSTC_WRAPPER               = "sccache"
# ROS environment variables required by some generators at build time
ROS_DISTRO                  = "rolling"
ROS_VERSION                 = "2"

[target.win-64.activation.env]
QT_QPA_PLATFORM_PLUGIN_PATH = "%cd%\\.pixi\\envs\\default\\Library\\plugins\\platforms"
# Windows needs different path expansion
COLCON_DEFAULTS_FILE        = "%PIXI_PROJECT_ROOT%\\colcon_defaults.yaml"

# conda-forge sets -Wl,--as-needed globally which causes pthread_once to be
# dropped when referenced only via C++ template instantiation (e.g. rclcpp).
# Override with --no-as-needed on Linux so pthread and similar are always linked.
# Also disable debug_assertions in dev profile to prevent static_init 1.0.3 bug
# where debug_assertions inadvertently enables parking_lot feature (E0433 on Rust>=1.82).
[target.linux-64.activation.env]
CMAKE_EXE_LINKER_FLAGS              = "-Wl,--no-as-needed"
CMAKE_SHARED_LINKER_FLAGS           = "-Wl,--no-as-needed"
LDFLAGS                             = "-Wl,--no-as-needed"
CARGO_PROFILE_DEV_DEBUG_ASSERTIONS  = "false"

# ==============================================================================
# Tasks (available in the default/build environment)
# ==============================================================================
[tasks]
graph = "colcon graph"
list  = "colcon list"
build = "colcon build"
test  = "colcon test"

[target.linux-64.tasks]
fetch = "mkdir -p src && vcs import --recursive src < ros2.repos"

[target.osx-arm64.tasks]
fetch = "mkdir -p src && vcs import --recursive src < ros2.repos"

[target.win-64.tasks]
fetch = "cmd /c \"if not exist src mkdir src\" && vcs import --recursive src < ros2.repos"
clean = "cmd /c \"if exist build rmdir /s /q build && if exist install rmdir /s /q install && if exist log rmdir /s /q log\""

[target.linux-64.tasks.clean]
cmd = "rm -rf build install log"

[target.osx-arm64.tasks.clean]
cmd = "rm -rf build install log"

# ==============================================================================
# RUNTIME FEATURE
# Libraries needed to run built ROS 2 artifacts.
# These go into a deployable runtime image / end-user environment.
# ==============================================================================
[feature.runtime.dependencies]
python = ">=3.12"

# Tier 3: C++ libraries used by rcutils and friends
spdlog         = "*"
yaml-cpp       = "*"
console_bridge = "*"

# Tier 4: additional runtime C++ libraries
tinyxml2      = "*"
asio          = "*"
nlohmann_json = "*"
yaml          = "*"
# rosidl_generator_py requires numpy headers at configure time
numpy         = "*"
# rclpy requires pybind11 to build the Python bindings
pybind11      = "*"

# ==============================================================================
# Platform-specific runtime deps
# ==============================================================================
[feature.runtime.target.linux-64.dependencies]
# lttng is a runtime tracing library used by tracetools
lttng-ust = "*"
# iceoryx_hoofs requires sys/acl.h (POSIX ACL — Linux only)
libacl    = "*"

# ==============================================================================
# BUILD FEATURE
# Tools needed to compile ROS 2 from source.
# Not required to run already-compiled artifacts.
# ==============================================================================
[feature.build.dependencies]
cmake  = "*"
ninja  = "*"
git    = "*"
curl   = "*"
# rust/cargo required by zenoh_cpp_vendor (rmw_zenoh_cpp)
rust   = "*"

[feature.build.pypi-dependencies]
vcs2l                            = { git = "https://github.com/ros-infrastructure/vcs2l" }
catkin-pkg                       = "*"
colcon-core                      = "*"
colcon-cmake                     = "*"
colcon-defaults                  = "*"
colcon-library-path              = "*"
colcon-metadata                  = "*"
colcon-mixin                     = "*"
colcon-output                    = "*"
colcon-package-information       = "*"
colcon-package-selection         = "*"
colcon-parallel-executor         = "*"
colcon-pkg-config                = "*"
colcon-powershell                = "*"
colcon-python-setup-py           = "*"
colcon-recursive-crawl           = "*"
colcon-ros                       = "*"
colcon-ros-domain-id-coordinator = "*"
colcon-test-result               = "*"
empy                             = "==3.3.4"
lark                             = "*"

# ==============================================================================
# Platform-specific build deps (compilers and compiler caches)
# ==============================================================================
[feature.build.target.linux-64.dependencies]
compilers  = "*"
sccache    = "*"
pkg-config = "*"

[feature.build.target.osx-arm64.dependencies]
compilers = "*"
sccache   = "*"

[feature.build.target.win-64.dependencies]
compilers = "*"
sccache   = "*"
