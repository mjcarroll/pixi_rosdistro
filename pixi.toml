[workspace]
name = "ros2_rolling"
version = "0.1.0"
description = "ROS 2 Rolling source build workspace with Pixi"
authors = []
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-arm64"]

# ==============================================================================
# Environments
# - default: runtime + build (what you need to build and run)
# - runtime: runtime-only (what a binary artifact consumer needs)
# ==============================================================================
[environments]
default = { features = ["runtime", "build"], solve-group = "default" }
runtime = { features = ["runtime"], solve-group = "default" }

# ==============================================================================
# Activation environment variables (applies to all environments)
# ==============================================================================
[activation.env]
# COLCON_DEFAULTS_FILE is set per-platform below
# sccache is used on all platforms for C/C++ and Rust caching
CMAKE_C_COMPILER_LAUNCHER   = "sccache"
CMAKE_CXX_COMPILER_LAUNCHER = "sccache"
# sccache also supports Rust — routes rustc through the cache for zenoh_c_vendor etc.
RUSTC_WRAPPER               = "sccache"
# Rust incremental compilation is not cacheable by sccache
CARGO_INCREMENTAL           = "0"
# ROS environment variables required by some generators at build time
ROS_DISTRO                  = "rolling"
ROS_VERSION                 = "2"

[target.win-64.activation.env]
QT_QPA_PLATFORM_PLUGIN_PATH = "%cd%\\.pixi\\envs\\default\\Library\\plugins\\platforms"
# Windows needs different path expansion and its own skip list
COLCON_DEFAULTS_FILE        = "%PIXI_PROJECT_ROOT%\\colcon_defaults_windows.yaml"
CFLAGS                      = "/MP /FS /EHsc"
CXXFLAGS                    = "/MP /FS /EHsc"
CC                          = "cl.exe"
CXX                         = "cl.exe"

# conda-forge sets -Wl,--as-needed globally which causes pthread_once to be
# dropped when referenced only via C++ template instantiation (e.g. rclcpp).
# Override with --no-as-needed on Linux so pthread and similar are always linked.
# Also disable debug_assertions in dev profile to prevent static_init 1.0.3 bug
# where debug_assertions inadvertently enables parking_lot feature (E0433 on Rust>=1.82).
[target.linux-64.activation.env]
CMAKE_EXE_LINKER_FLAGS              = "-fuse-ld=mold -Wl,--no-as-needed"
CMAKE_SHARED_LINKER_FLAGS           = "-fuse-ld=mold -Wl,--no-as-needed"
LDFLAGS                             = "-Wl,--no-as-needed"
# Use Linux-specific defaults (allows skipping or configuring Linux-only bits)
COLCON_DEFAULTS_FILE        = "$PIXI_PROJECT_ROOT/colcon_defaults_linux.yaml"
# mcap_vendor's Findlz4.cmake reads lz4_ROOT_DIR env var for nonstandard install paths.
# The lz4-c conda package installs to the conda prefix, not /usr, so cmake can't find
# the library without this hint.
lz4_ROOT_DIR                        = "$CONDA_PREFIX"
# Ensure Qt6 is found in the conda prefix
Qt6_DIR                             = "$CONDA_PREFIX/lib/cmake/Qt6"
# Force cargo to use git CLI for fetching to handle potential SSH redirections
CARGO_NET_GIT_FETCH_WITH_CLI        = "true"

# Use lld (from conda-forge llvm) on macOS as the linker for C/C++ and Rust.
# macOS clang supports -fuse-ld=lld when lld is installed.
[target.osx-arm64.activation.env]
CMAKE_EXE_LINKER_FLAGS    = "-fuse-ld=lld"
CMAKE_SHARED_LINKER_FLAGS = "-fuse-ld=lld"
COLCON_DEFAULTS_FILE      = "$PIXI_PROJECT_ROOT/colcon_defaults_linux.yaml"
# Ensure Qt6 is found in the conda prefix
Qt6_DIR                   = "$CONDA_PREFIX/lib/cmake/Qt6"

# ==============================================================================
# Tasks (available in the default/build environment)
# ==============================================================================
[tasks]
graph = "colcon graph"
list  = "colcon list"
patch = { cmd = "python patches/patch_ogre.py && python patches/patch_gazebo.py && python patches/patch_rcl.py && python patches/patch_class_loader.py && python patches/patch_qt.py && python patches/patch_rqt.py", depends-on = ["fetch"] }
build = { cmd = "colcon build", depends-on = ["patch"] }
test  = "colcon test"
fetch = "mkdir -p src && vcs import --recursive src < ros2.repos"

[target.linux-64.tasks]
# Using global fetch

[target.osx-arm64.tasks]
# Using global fetch

[target.win-64.tasks]
fetch = "cmd /c \"if not exist src mkdir src\" && vcs import --recursive src < ros2.repos"
clean = "cmd /c \"if exist build rmdir /s /q build && if exist install rmdir /s /q install && if exist log rmdir /s /q log\""

[target.linux-64.tasks.clean]
cmd = "rm -rf build install log"

[target.osx-arm64.tasks.clean]
cmd = "rm -rf build install log"

# ==============================================================================
# RUNTIME FEATURE
# Libraries needed to run built ROS 2 artifacts.
# These go into a deployable runtime image / end-user environment.
# ==============================================================================
[feature.runtime.dependencies]
python = "3.12.*"

# Tier 3: C++ libraries used by rcutils and friends
spdlog         = "*"
yaml-cpp       = "*"
console_bridge = "*"
assimp         = "*"
eigen          = "3.4.*"

# Tier 4: additional runtime C++ libraries
tinyxml2      = "*"
asio          = "*"
nlohmann_json = "*"
yaml          = "*"
# rosidl_generator_py requires numpy headers at configure time
numpy         = "*"
# rclpy requires pybind11 to build the Python bindings
pybind11      = "*"
pyqt6         = "*"
orocos-kdl    = "*"
opencv        = "*"
bullet        = "*"
sdl2          = "*"

# Vendor package system replacements — skip building from source:
#   google_benchmark_vendor: skips if find_package(benchmark) >= 1.8.3 (shared)
#   uncrustify_vendor: skips if uncrustify binary >= 0.78 is found in PATH
benchmark          = ">=1.8.3"
uncrustify         = ">=0.78"
# Explicitly include lz4-c so cmake's find_library can find liblz4 (via lz4_ROOT_DIR env var on Linux)
lz4-c              = "*"
# Qt6 for RViz
qt6-main           = "*"
# Ogre dependencies (shared across platforms)
freetype           = "*"
freeimage          = "*"
zziplib            = "*"
zlib               = "*"

[feature.runtime.target.osx-arm64.dependencies]

# ==============================================================================
# Platform-specific runtime deps
# ==============================================================================
[feature.runtime.target.linux-64.dependencies]
# lttng-ust: userspace tracing library (tracetools)
lttng-ust   = "*"
# iceoryx_hoofs requires sys/acl.h (POSIX ACL — Linux only)
libacl      = "*"
# Ogre/X11 dependencies for Linux
mesalib         = "*"
libgl-devel     = "*"
libgles-devel   = "*"
libglu          = "*"
xorg-libx11     = "*"
xorg-libxext    = "*"
xorg-libxrandr  = "*"
xorg-libxaw     = "*"
xorg-libxt      = "*"
xorg-libice     = "*"
xorg-libsm      = "*"
# Gazebo low-level dependencies for source build
cli11           = "*"
libxml2         = "*"
bzip2           = "*"

# ==============================================================================
# BUILD FEATURE
# Tools needed to compile ROS 2 from source.
# Not required to run already-compiled artifacts.
# ==============================================================================
[feature.build.dependencies]
cmake  = "*"
ninja  = "*"
git    = "*"
curl   = "*"
# rust/cargo required by zenoh_cpp_vendor (rmw_zenoh_cpp)
rust   = "*"
sip    = "*"
pyqt-builder = "*"
pip    = "*"

[feature.build.pypi-dependencies]
vcs2l                            = { git = "https://github.com/ros-infrastructure/vcs2l" }
catkin-pkg                       = "*"
colcon-core                      = "*"
colcon-cmake                     = "*"
colcon-defaults                  = "*"
colcon-library-path              = "*"
colcon-metadata                  = "*"
colcon-mixin                     = "*"
colcon-output                    = "*"
colcon-package-information       = "*"
colcon-package-selection         = "*"
colcon-parallel-executor         = "*"
colcon-pkg-config                = "*"
colcon-powershell                = "*"
colcon-python-setup-py           = "*"
colcon-recursive-crawl           = "*"
colcon-ros                       = "*"
colcon-ros-domain-id-coordinator = "*"
colcon-test-result               = "*"
empy                             = "==3.3.4"
lark                             = "*"

# ==============================================================================
# Platform-specific build deps (compilers and compiler caches)
# ==============================================================================
[feature.build.target.linux-64.dependencies]
compilers  = "*"
sccache    = "*"
pkg-config = "*"
# mold: faster linker for Linux C/C++ (2-10x vs GNU ld); also used by Rust via .cargo/config.toml
mold       = "*"

[feature.build.target.osx-arm64.dependencies]
sccache   = "*"
# lld: faster linker for macOS (pairs with -fuse-ld=lld in activation env)
lld       = "*"

[feature.build.target.win-64.dependencies]
compilers = "*"
sccache   = "*"
